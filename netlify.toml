[build]
  command = "npm run build"
  publish = "dist"

# SPA catch-all — serves index.html for any path with no static
# file. (We fetch CelesTrak TLEs directly from the browser rather
# than proxying, so the deploy works identically on GitHub Pages,
# which has no rewrite engine. CelesTrak sends ACAO: * so the
# cross-origin fetch is allowed; the CSP connect-src below grants it.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # img-src includes server.arcgisonline.com for the Esri detail-tile
    # mosaic; connect-src includes celestrak.org (TLEs incl. ISS) and
    # ll.thespacedevs.com (Launch Library 2); frame-src allows the YouTube
    # launch-webcast embed.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://server.arcgisonline.com; font-src 'self' data:; connect-src 'self' https://celestrak.org https://ll.thespacedevs.com https://api.open-meteo.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
